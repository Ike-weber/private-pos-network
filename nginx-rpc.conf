server {
    listen 8441 ssl;
    server_name localhost;

    ssl_certificate /home/harsh/eth-pos/private-pos/rpc-cert.pem;
    ssl_certificate_key /home/harsh/eth-pos/private-pos/rpc-key.pem;

    # Rate limiting: 10 req/sec per IP, burst 20
    limit_req_zone $binary_remote_addr zone=rpc:10m rate=10r/s;
    limit_req zone=rpc burst=20 nodelay;

    location / {
        # API key auth via header X-API-Key, must match rpc-users.txt token
        # Simpler: use basic auth
        auth_basic "Geth RPC";
        auth_basic_user_file /home/harsh/eth-pos/private-pos/rpc-htpasswd;

        proxy_pass http://127.0.0.1:8541;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
